<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:var(--bg-canvas);margin:0;display:flex;flex-direction:column;gap:10px;font-family:var(--font-body)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .primary{background:var(--brand-600);color:#fff;font-weight:800;font-size:15px;border-radius:14px;padding:12px 18px;border:0;box-shadow:var(--shadow-soft)}
  .ghost{background:transparent;color:var(--brand-700);font-weight:700;font-size:14px;border-radius:14px;padding:11px 16px;border:1.5px solid var(--brand-100)}
  .pill-link{background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.30);border-radius:9999px;padding:8px 14px;font-size:12px;font-weight:700}
  .dark-bg{background:radial-gradient(120% 90% at 20% 10%, #0c2a1e 0%, #081c13 100%);padding:12px;border-radius:14px;display:flex;gap:10px}
  .fab{width:64px;height:64px;border-radius:9999px;background:var(--brand-500);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 50px rgba(8,30,19,.30);border:0}
  .fab svg{width:28px;height:28px}
</style></head><body>
<div class="row">
  <button class="primary">Entrar con Passkey</button>
  <button class="ghost">Validar</button>
  <button class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
</div>
<div class="dark-bg row">
  <button class="pill-link">Ver tutorial</button>
  <button class="pill-link">Soporte</button>
</div>
</body></html>
