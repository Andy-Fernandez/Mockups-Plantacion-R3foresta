<!doctype html><html><head><meta charset="utf-8"><title>Bottom nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:var(--bg-canvas);margin:0;font-family:var(--font-body);display:flex;justify-content:center}
  .nav{background:var(--brand-600);color:#fff;border-radius:28px;padding:14px 18px;display:flex;gap:6px;align-items:center;box-shadow:0 20px 50px rgba(8,30,19,.30);position:relative;width:420px;justify-content:space-around}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;opacity:.7;color:#fff}
  .tab.on{opacity:1}
  .tab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .fab{width:56px;height:56px;border-radius:50%;background:var(--brand-500);color:#fff;border:4px solid var(--brand-600);display:flex;align-items:center;justify-content:center;margin:0 4px}
  .fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style></head><body>
<div class="nav">
  <div class="tab on"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>Inicio</div>
  <div class="tab"><svg viewBox="0 0 24 24"><path d="M4 6h2v12H4zM18 6h2v12h-2zM8 5v14M16 5v14M11 7v10M13 7v10"/></svg>Escanear</div>
  <div class="fab"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
  <div class="tab"><svg viewBox="0 0 24 24"><path d="M4 4h12l4 4v12H4z M16 4v4h4"/></svg>Reportes</div>
  <div class="tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Perfil</div>
</div>
</body></html>
