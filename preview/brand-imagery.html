<!doctype html><html><head><meta charset="utf-8"><title>Imagery</title>
<style>
  body{padding:14px;background:#fff;margin:0;font-family:'Manrope',sans-serif}
  .row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:10px}
  .img{height:130px;border-radius:18px;background-size:cover;background-position:center;position:relative;overflow:hidden}
  .a{background-image:url('../assets/hero-canopy.jpg')}
  .b{background-image:url('../assets/germinacion.jpg')}
  .c{background-image:url('../assets/plantacion.jpg')}
  .d{background-image:url('../assets/co2.jpg')}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg, transparent 40%, rgba(8,20,15,.85) 100%)}
  .lab{position:absolute;left:10px;bottom:8px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
</style></head><body>
<div class="row">
  <div class="img a"><div class="scrim"></div><div class="lab">Canopy · hero</div></div>
  <div class="img b"><div class="scrim"></div><div class="lab">Germinación</div></div>
  <div class="img c"><div class="scrim"></div><div class="lab">Plantación</div></div>
  <div class="img d"><div class="scrim"></div><div class="lab">CO₂</div></div>
</div>
</body></html>
