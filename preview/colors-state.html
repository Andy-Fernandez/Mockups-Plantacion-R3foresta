<!doctype html><html><head><meta charset="utf-8"><title>State badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:#fff;margin:0;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;gap:6px;flex-wrap:wrap}
  .pill{font:700 11px/1 var(--font-body);padding:5px 10px;border-radius:9999px;letter-spacing:.02em}
  .validated{background:var(--state-validated-bg);color:var(--state-validated-fg)}
  .pending{background:var(--state-pending-bg);color:var(--state-pending-fg)}
  .rejected{background:var(--state-rejected-bg);color:var(--state-rejected-fg)}
  .draft{background:var(--state-draft-bg);color:var(--state-draft-fg)}
  .open{background:var(--state-open-bg);color:var(--state-open-fg)}
  .closed{background:var(--state-closed-bg);color:var(--state-closed-fg)}
  .group-label{font:600 10px/1 var(--font-body);text-transform:uppercase;letter-spacing:.2em;color:var(--fg-3)}
</style></head><body>
  <div class="group-label">Validation</div>
  <div class="row">
    <span class="pill validated">VALIDADO</span>
    <span class="pill pending">PENDIENTE_VALIDACION</span>
    <span class="pill rejected">RECHAZADO</span>
    <span class="pill draft">BORRADOR</span>
  </div>
  <div class="group-label" style="margin-top:8px">Lifecycle</div>
  <div class="row">
    <span class="pill open">ABIERTO</span>
    <span class="pill validated">ACTIVO</span>
    <span class="pill closed">FINALIZADO</span>
    <span class="pill closed">CERRADO</span>
  </div>
  <div class="group-label" style="margin-top:8px">Vivero events</div>
  <div class="row">
    <span class="pill validated">INICIO</span>
    <span class="pill validated">EMBOLSADO</span>
    <span class="pill pending">ADAPTABILIDAD</span>
    <span class="pill rejected">MERMA</span>
    <span class="pill open">DESPACHO</span>
    <span class="pill draft">CIERRE_AUTOMATICO</span>
  </div>
</body></html>
