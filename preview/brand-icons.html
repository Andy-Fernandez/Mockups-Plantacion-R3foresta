<!doctype html><html><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:#fff;margin:0;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--brand-700)}
  .cell svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .name{font-size:9.5px;font-weight:600;color:var(--fg-3)}
</style></head><body>
<div class="grid">
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/></svg><div class="name">home</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M12 3c4 4 6 7 6 11a6 6 0 1 1-12 0c0-4 2-7 6-11z"/></svg><div class="name">leaf</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M5 21v-3a4 4 0 0 1 4-4M5 21h10M5 21h-2M15 21v-7a4 4 0 0 0-4-4M9 7a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/></svg><div class="name">vivero</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M12 21V9M12 9c-3-3-6-3-6 0M12 9c3-3 6-3 6 0M12 17H5M12 17h7"/></svg><div class="name">planting</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c2 0 4 .6 5.5 1.7M21 5l-9 9-3-3"/></svg><div class="name">check</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M12 21s-7-6-7-12a7 7 0 0 1 14 0c0 6-7 12-7 12z"/><circle cx="12" cy="9" r="3"/></svg><div class="name">pin</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M21 19V7l-9 5-9-5v12z"/><path d="M3 7l9 5 9-5"/></svg><div class="name">photo</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg><div class="name">qr</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg><div class="name">plus</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M19 12H5"/></svg><div class="name">minus</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><div class="name">arrow-left</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg><div class="name">chevron</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg><div class="name">search</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7zM9 7V4h6v3"/></svg><div class="name">trash</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg><div class="name">info</div></div>
  <div class="cell"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M10 21h4"/></svg><div class="name">bell</div></div>
</div>
</body></html>
