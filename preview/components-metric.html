<!doctype html><html><head><meta charset="utf-8"><title>Metric card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:14px;background:var(--bg-canvas);margin:0;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .m{background:#fff;border-radius:18px;padding:12px;box-shadow:var(--shadow-soft),inset 0 0 0 1px var(--hairline)}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--brand-500);font-weight:700}
  .n{font-size:22px;font-weight:800;color:var(--brand-700);letter-spacing:-.02em;margin-top:6px}
  .u{font-size:11px;color:var(--fg-3);font-weight:600;margin-top:2px}
  .delta{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#047857;margin-top:8px}
</style></head><body>
<div class="grid">
  <div class="m"><div class="label">Plantas vivas</div><div class="n">12 480</div><div class="u">UNIDAD</div><div class="delta">▲ 6,2% · 7d</div></div>
  <div class="m"><div class="label">Recolección</div><div class="n">2 145</div><div class="u">G · semilla</div><div class="delta">▲ 1,4% · 7d</div></div>
  <div class="m"><div class="label">CO₂ acumulado</div><div class="n">86,4</div><div class="u">T · ha-1</div><div class="delta">▲ 0,8% · 30d</div></div>
</div>
</body></html>
