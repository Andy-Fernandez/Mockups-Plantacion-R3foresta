<!doctype html><html><head><meta charset="utf-8"><title>Radii & shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:var(--bg-canvas);margin:0;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .box{height:100px;background:#fff;display:flex;align-items:flex-end;padding:10px;font-size:11px;color:var(--brand-700);font-weight:600;box-shadow:var(--shadow-soft),inset 0 0 0 1px var(--hairline)}
  .r1{border-radius:8px}.r2{border-radius:16px}.r3{border-radius:24px}.r4{border-radius:9999px;width:100px;justify-self:center}
</style></head><body>
<div class="row">
  <div class="box r1">8px · sm</div>
  <div class="box r2">16px · 2xl (cards)</div>
  <div class="box r3">24px · 3xl (heroes)</div>
  <div class="box r4">pill</div>
</div>
</body></html>
