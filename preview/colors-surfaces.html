<!doctype html><html><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:#fff;margin:0}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sw{border-radius:14px;height:110px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 0 0 1px var(--hairline);overflow:hidden;position:relative}
  .name{font:600 11px/1 var(--font-body);letter-spacing:.04em}
  .hex{font:500 11px/1.4 var(--font-body);opacity:.85}
  .light{color:#0f3b29}.dark{color:#fff}
  .night{background:radial-gradient(120% 90% at 20% 10%, #0c2a1e 0%, #081c13 60%, #08140f 100%)}
  .glow{position:absolute;inset:auto -20% -30% auto;width:180px;height:120px;background:rgba(52,211,153,.35);filter:blur(40px);border-radius:50%}
</style></head><body>
<div class="row">
  <div class="sw light" style="background:var(--bg-radial)"><div><div class="name">canvas</div><div class="hex">radial · #f6f7f3</div></div></div>
  <div class="sw light" style="background:var(--bg-canvas-dim)"><div><div class="name">canvas-dim</div><div class="hex">#eef1eb</div></div></div>
  <div class="sw dark night"><div class="glow"></div><div style="position:relative"><div class="name">night-hero</div><div class="hex">#081c13 → #0c2a1e</div></div></div>
</div>
</body></html>
