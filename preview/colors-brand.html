<!doctype html><html><head><meta charset="utf-8"><title>Brand greens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:#fff;margin:0}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:14px;height:90px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-shadow:inset 0 0 0 1px var(--hairline)}
  .name{font:600 11px/1 var(--font-body);letter-spacing:.04em}
  .hex{font:500 11px/1.5 var(--font-body);opacity:.85;margin-top:3px}
  .light{color:#0f3b29}.dark{color:#fff}
</style></head><body>
<div class="row">
  <div class="sw light" style="background:var(--brand-50)"><div class="name">brand-50</div><div class="hex">#f0f6f2</div></div>
  <div class="sw light" style="background:var(--brand-100)"><div class="name">brand-100</div><div class="hex">#d9e8dd</div></div>
  <div class="sw dark" style="background:var(--brand-500)"><div class="name">brand-500</div><div class="hex">#1f613b</div></div>
  <div class="sw dark" style="background:var(--brand-600)"><div class="name">brand-600</div><div class="hex">#164d2f</div></div>
  <div class="sw dark" style="background:var(--brand-700)"><div class="name">brand-700</div><div class="hex">#0f3b23</div></div>
</div>
</body></html>
