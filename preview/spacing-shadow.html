<!doctype html><html><head><meta charset="utf-8"><title>Shadow & elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg-canvas);margin:0;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .card{background:#fff;border-radius:18px;height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .a{box-shadow:inset 0 0 0 1px var(--hairline)}
  .b{box-shadow:var(--shadow-soft)}
  .c{background:var(--brand-600);color:#fff;box-shadow:0 20px 50px rgba(8,30,19,.30)}
  .label{font-size:11px;font-weight:600}
  .sub{font-size:11px;opacity:.7;font-weight:500}
</style></head><body>
<div class="row">
  <div class="card a"><div class="label">ring-1 · hairline</div><div class="sub">cards w/ no shadow</div></div>
  <div class="card b"><div class="label">shadow-soft</div><div class="sub">0 10 30 rgba(0,0,0,.06)</div></div>
  <div class="card c"><div class="label">shadow-nav</div><div class="sub">brand-tinted, FAB & bottom-nav</div></div>
</div>
</body></html>
