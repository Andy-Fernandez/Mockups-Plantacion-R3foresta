<!doctype html><html><head><meta charset="utf-8"><title>Type body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:#fff;margin:0;display:flex;flex-direction:column;gap:8px;font-family:var(--font-body);color:var(--brand-700)}
  .b1{font-size:16px;font-weight:600}
  .b2{font-size:14px;font-weight:500;line-height:1.5;color:#0f3b29}
  .helper{font-size:12px;color:var(--brand-500);font-weight:500}
  .sci{font-size:13px;font-style:italic;color:var(--fg-3)}
  .num{font-size:20px;font-weight:600;color:var(--brand-700);letter-spacing:-.01em}
  .label{font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.18em}
</style></head><body>
<div class="b1">Lote V-2046 · Schinopsis brasiliensis</div>
<div class="b2">Monitorea cada fase del vivero y mantiene la sincronización al día con tu equipo.</div>
<div class="helper">Biometría solo cuando sea necesario.</div>
<div class="sci">Anadenanthera colubrina</div>
<div class="label">Plantas vivas</div>
<div class="num">12 480 <span style="font-size:13px;color:var(--fg-3);font-weight:500">UNIDAD</span></div>
</body></html>
