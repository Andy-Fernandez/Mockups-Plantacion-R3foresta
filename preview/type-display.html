<!doctype html><html><head><meta charset="utf-8"><title>Type display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px;background:#fff;margin:0}
  .stack{display:flex;flex-direction:column;gap:6px}
  .eyebrow{font:600 12px/1 var(--font-body);text-transform:uppercase;letter-spacing:.28em;color:var(--brand-500)}
  .h1{font:800 30px/1.05 var(--font-body);color:var(--brand-700);letter-spacing:-.015em}
  .h2{font:600 24px/1.1 var(--font-body);color:var(--brand-700);letter-spacing:-.01em}
  .h3{font:700 18px/1.2 var(--font-body);color:var(--brand-700)}
</style></head><body>
<div class="stack">
  <div class="eyebrow">Eyebrow · 12 / 800 · 0.28em</div>
  <div class="h1">Trazabilidad viva</div>
  <div class="h2">Recolecciones del día</div>
  <div class="h3">Indicadores clave</div>
</div>
</body></html>
