<!doctype html><html><head><meta charset="utf-8"><title>Semantic feedback</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:14px;background:#fff;margin:0;display:flex;flex-direction:column;gap:10px;font-family:var(--font-body)}
  .warn{display:flex;gap:10px;align-items:flex-start;padding:12px;border-radius:14px;background:var(--warn-bg);border:1px solid var(--warn-border)}
  .warn .ic{width:28px;height:28px;flex:0 0 28px;border-radius:50%;background:var(--warn-icon-bg);color:var(--warn-icon-fg);display:flex;align-items:center;justify-content:center;font-weight:800}
  .warn p{margin:0;color:var(--warn-fg);font-size:12.5px;font-weight:500;line-height:1.35}
  .err{display:flex;gap:8px;padding:10px 12px;border-radius:10px;background:var(--error-bg);border-left:4px solid var(--error-border);color:var(--error-fg);font-size:12.5px;font-weight:500}
</style></head><body>
<div class="warn">
  <div class="ic">!</div>
  <p><b>Perfil incompleto.</b> Necesitas completar tu perfil para acceder a todas las funcionalidades.</p>
</div>
<div class="err">No se pudo iniciar sesión. Verifica tu Passkey e inténtalo de nuevo.</div>
</body></html>
