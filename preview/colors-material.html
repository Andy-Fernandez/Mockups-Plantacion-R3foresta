<!doctype html><html><head><meta charset="utf-8"><title>Material badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:#fff;margin:0;display:flex;flex-direction:column;gap:14px;align-items:flex-start}
  .label{font:600 11px/1 var(--font-body);text-transform:uppercase;letter-spacing:.2em;color:var(--brand-500)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;font:700 12px/1 var(--font-body);padding:6px 12px;border-radius:9999px}
  .semilla{background:var(--semilla-bg);color:var(--semilla-fg);box-shadow:inset 0 0 0 1px var(--semilla-ring)}
  .esqueje{background:var(--esqueje-bg);color:var(--esqueje-fg);box-shadow:inset 0 0 0 1px var(--esqueje-ring)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head><body>
  <div class="label">Material badges</div>
  <div class="row">
    <span class="pill semilla"><span class="dot"></span>SEMILLA</span>
    <span class="pill esqueje"><span class="dot"></span>ESQUEJE</span>
  </div>
</body></html>
